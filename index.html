<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 · Giscus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            line-height: 1.5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 2rem 1.5rem;
        }
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }
        .visitor-badge {
            background: #f0f2f5;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
            flex-wrap: wrap;
        }
        .visitor-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .visitor-number {
            font-weight: 600;
            color: #2c3e66;
            background: white;
            padding: 0 6px;
            border-radius: 20px;
            min-width: 40px;
            display: inline-block;
            text-align: center;
        }
        .sub {
            color: #586069;
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
            margin: 0.5rem 0 1.8rem 0;
            font-size: 0.9rem;
        }
        .giscus-wrapper {
            margin-top: 1rem;
        }
        hr {
            margin: 1rem 0;
            border: none;
            border-top: 1px solid #eaeef2;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #8b949e;
        }
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .container { padding: 1.5rem; }
            h1 { font-size: 1.5rem; }
            .header-area { flex-direction: column; align-items: flex-start; }
            .visitor-badge { align-self: flex-start; white-space: normal; }
        }
    </style>
    <!-- 引入不蒜子计数器 (busuanzi) -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</head>
<body>
<div class="container">
    <div class="header-area">
        <h1>💬 留言板</h1>
        <div class="visitor-badge">
            <span class="visitor-item">🌐 总访问量: <span id="busuanzi_value_site_pv" class="visitor-number">加载中...</span></span>
            <span class="visitor-item">📄 本页访问: <span id="busuanzi_value_page_pv" class="visitor-number">加载中...</span></span>
        </div>
    </div>
    <div class="sub">基于 GitHub Discussions · 欢迎留下你的想法</div>

    <!-- Giscus 评论组件容器 -->
    <div class="giscus-wrapper"></div>
    <script src="https://giscus.app/client.js"
        data-repo="r3111453/Giscus"
        data-repo-id="R_kgDOSDhjjw"
        data-category="Announcements"
        data-category-id="DIC_kwDOSDhjj84C66gP"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="zh-CN"
        crossorigin="anonymous"
        async>
    </script>
    <hr />
    <footer>使用 Giscus 驱动 | 需要 GitHub 账号登录后留言 | 访问统计由 不蒜子 提供</footer>
</div>

<!-- 不蒜子脚本可能加载失败时的友好提示（可选） -->
<script>
    // 检测不蒜子是否成功加载，若2秒后busuanzi_value_site_pv仍为"加载中..."，则显示暂不可用
    setTimeout(function() {
        var sitePv = document.getElementById('busuanzi_value_site_pv');
        var pagePv = document.getElementById('busuanzi_value_page_pv');
        if (sitePv && sitePv.innerText === '加载中...') {
            sitePv.innerText = '暂不可用';
            pagePv.innerText = '暂不可用';
        }
    }, 2000);
</script>
</body>
</html>
