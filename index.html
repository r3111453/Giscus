<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 · Giscus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            line-height: 1.5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 2rem 1.5rem;
        }
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }
        .visitor-badge {
            background: #f0f2f5;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .visitor-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .visitor-number {
            font-weight: 600;
            color: #2c3e66;
            background: white;
            padding: 0 6px;
            border-radius: 20px;
            min-width: 40px;
            display: inline-block;
            text-align: center;
        }
        .sub {
            color: #586069;
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
            margin: 0.5rem 0 1.8rem 0;
            font-size: 0.9rem;
        }
        .giscus-wrapper {
            margin-top: 1rem;
        }
        hr {
            margin: 1rem 0;
            border: none;
            border-top: 1px solid #eaeef2;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #8b949e;
        }
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .container { padding: 1.5rem; }
            h1 { font-size: 1.5rem; }
            .header-area { flex-direction: column; align-items: flex-start; }
            .visitor-badge { align-self: flex-start; }
        }
    </style>
    <!-- 引入不蒜子计数器 (busuanzi) 用于展示总访问量（无法防刷，仅作参考） -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</head>
<body>
<div class="container">
    <div class="header-area">
        <h1>💬 留言板</h1>
        <div class="visitor-badge">
            <span class="visitor-item">🌐 总访问量: <span id="busuanzi_value_site_pv" class="visitor-number">加载中...</span></span>
            <span class="visitor-item">📄 本页访问: <span id="busuanzi_value_page_pv" class="visitor-number">加载中...</span></span>
            <span class="visitor-item">👤 真实访客: <span id="uniqueVisitorCount" class="visitor-number">加载中...</span></span>
        </div>
    </div>
    <div class="sub">基于 GitHub Discussions · 欢迎留下你的想法</div>

    <div class="giscus-wrapper"></div>
    <script src="https://giscus.app/client.js"
        data-repo="r3111453/Giscus"
        data-repo-id="R_kgDOSDhjjw"
        data-category="Announcements"
        data-category-id="DIC_kwDOSDhjj84C66gP"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="zh-CN"
        crossorigin="anonymous"
        async>
    </script>
    <hr />
    <footer>使用 Giscus 驱动 | 需要 GitHub 账号登录后留言 | 总访问量由 不蒜子 提供（刷新会增加） | 真实访客计数基于浏览器记录</footer>
</div>

<script>
    // 真实访客计数器（使用 localStorage + CountAPI，每个浏览器只计一次）
    (function() {
        const storageKey = 'unique_visitor_counted';
        const namespace = 'giscus_board_unique';
        const pageKey = window.location.hostname + window.location.pathname;  // 以域名+路径作为标识
        const encodedKey = encodeURIComponent(pageKey);
        
        // 显示真实访客数量的元素
        const uniqueSpan = document.getElementById('uniqueVisitorCount');
        if (!uniqueSpan) return;

        // 先获取当前真实访客数量（只获取，不增加）
        const getUrl = `https://api.countapi.xyz/get/${namespace}/${encodedKey}`;
        fetch(getUrl)
            .then(res => res.ok ? res.json() : Promise.reject('API error'))
            .then(data => {
                const count = data.value || 0;
                uniqueSpan.textContent = count;
            })
            .catch(err => {
                console.warn('获取真实访客数失败:', err);
                uniqueSpan.textContent = '暂不可用';
            });

        // 检查本地存储，如果未计数过则调用 hit 接口增加计数
        const alreadyCounted = localStorage.getItem(storageKey);
        if (!alreadyCounted) {
            const hitUrl = `https://api.countapi.xyz/hit/${namespace}/${encodedKey}`;
            fetch(hitUrl)
                .then(res => res.ok ? res.json() : Promise.reject('hit failed'))
                .then(data => {
                    // 更新显示最新数量
                    uniqueSpan.textContent = data.value;
                    // 标记已计数
                    localStorage.setItem(storageKey, 'true');
                })
                .catch(err => console.warn('真实访客计数失败:', err));
        }
    })();

    // 不蒜子加载失败的友好提示（可选）
    setTimeout(function() {
        var sitePv = document.getElementById('busuanzi_value_site_pv');
        var pagePv = document.getElementById('busuanzi_value_page_pv');
        if (sitePv && sitePv.innerText === '加载中...') {
            sitePv.innerText = '暂不可用';
            pagePv.innerText = '暂不可用';
        }
    }, 2000);
</script>
</body>
</html>
