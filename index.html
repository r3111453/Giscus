<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 · Giscus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            line-height: 1.5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 2rem 1.5rem;
        }
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }
        .visitor-badge {
            background: #f0f2f5;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .visitor-badge .count-number {
            font-weight: 600;
            color: #2c3e66;
            background: white;
            padding: 0 6px;
            border-radius: 20px;
            margin-left: 4px;
        }
        .sub {
            color: #586069;
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
            margin: 0.5rem 0 1.8rem 0;
            font-size: 0.9rem;
        }
        .giscus-wrapper {
            margin-top: 1rem;
        }
        hr {
            margin: 1rem 0;
            border: none;
            border-top: 1px solid #eaeef2;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #8b949e;
        }
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .container { padding: 1.5rem; }
            h1 { font-size: 1.5rem; }
            .header-area { flex-direction: column; align-items: flex-start; }
            .visitor-badge { align-self: flex-start; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-area">
        <h1>💬 留言板</h1>
        <!-- 访客计数器：使用 CountAPI 动态获取 -->
        <div class="visitor-badge" id="visitorCounter">
            <span>👀 访问量</span>
            <span id="visitCount" class="count-number">加载中...</span>
        </div>
    </div>
    <div class="sub">基于 GitHub Discussions · 欢迎留下你的想法</div>

    <!-- Giscus 评论组件容器 -->
    <div class="giscus-wrapper"></div>
    <script src="https://giscus.app/client.js"
        data-repo="r3111453/Giscus"
        data-repo-id="R_kgDOSDhjjw"
        data-category="Announcements"
        data-category-id="DIC_kwDOSDhjj84C66gP"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="zh-CN"
        crossorigin="anonymous"
        async>
    </script>
    <hr />
    <footer>使用 Giscus 驱动 | 需要 GitHub 账号登录后留言</footer>
</div>

<script>
    (function() {
        // 使用 CountAPI 免费计数服务
        // 为当前页面生成唯一标识（使用完整 URL 作为 key，确保不同页面独立计数）
        var pageKey = window.location.href;   // 完整 URL
        // 但因为 URL 可能包含特殊字符，需要编码
        var encodedKey = encodeURIComponent(pageKey);
        // 使用固定 namespace，避免冲突
        var namespace = 'giscus_board';
        // 计数 API 地址（每次访问 +1，并返回最新计数）
        var apiUrl = 'https://api.countapi.xyz/hit/' + namespace + '/' + encodedKey;
        
        var countSpan = document.getElementById('visitCount');
        if (!countSpan) return;
        
        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error('HTTP error ' + response.status);
                return response.json();
            })
            .then(data => {
                // data.value 即为当前访问次数
                var count = data.value;
                countSpan.textContent = count;
            })
            .catch(error => {
                console.warn('计数器加载失败:', error);
                countSpan.textContent = '暂不可用';
            });
    })();
</script>
</body>
</html>
